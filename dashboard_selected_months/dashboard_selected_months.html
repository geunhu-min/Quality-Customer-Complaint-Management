function svgNiceTicks(maxValue,tickCount=5){
  const safeMax=Math.max(Number(maxValue)||0,1)*1.15;
  const rawStep=safeMax/tickCount;
  const magnitude=Math.pow(10,Math.floor(Math.log10(rawStep)));
  const norm2=rawStep/magnitude;
  let niceNorm=10;
  if(norm2<=1)niceNorm=1;else if(norm2<=2)niceNorm=2;else if(norm2<=5)niceNorm=5;
  const step=niceNorm*magnitude;
  const niceMax=Math.ceil(safeMax/step)*step;
  const ticks=[];
  for(let v=0;v<=niceMax+step/2;v+=step)ticks.push(Math.round(v));
  return {ticks,niceMax:niceMax||step};
}

function svgLineChartMarkup(categories,series,opts={}){
  const width=opts.width||640, height=opts.height||300;

  const padLeft=opts.padLeft||58, padRight=opts.padRight||14, padTop=opts.padTop||24, padBottom=opts.padBottom||34;
  const innerW=width-padLeft-padRight, innerH=height-padTop-padBottom;

  const {ticks,niceMax}=svgNiceTicks(Math.max(1,...allValues));
  const step=categories.length>1?innerW/(categories.length-1):0;
  const axis=ticks.map(t=>{
    const y=padTop+innerH-(t/niceMax)*innerH;
    return `<line x1="${padLeft}" y1="${y}" x2="${padLeft+innerW}" y2="${y}" class="wsvg-grid"></line><text x="${padLeft-8}" y="${y}" text-anchor="end" dominant-baseline="middle" class="wsvg-axis-label">${svgEsc(opts.axisFormatter?opts.axisFormatter(t):t.toLocaleString())}</text>`;
  }).join("");
  const xLabels=categories.map((c,i)=>`<text x="${padLeft+i*step}" y="${height-padBottom+20}" text-anchor="middle" class="wsvg-axis-label">${svgEsc(c)}</text>`).join("");
  const showValues=opts.showValues!==false;
  const allPts=series.map((s,si)=>({
    s,
    color:s.color||SVG_CHART_COLORS[si%SVG_CHART_COLORS.length],
    pts:s.values.map((v,i)=>({x:padLeft+i*step,y:padTop+innerH-(niceMax?(Number(v||0)/niceMax)*innerH:0),v:Number(v||0),cat:categories[i]}))
  }));
  const seriesMarkup=allPts.map(({s,color,pts},si)=>{
    const line=pts.map(p=>`${p.x},${p.y}`).join(" ");
    const labelText=p=>svgEsc(opts.valueFormatter?opts.valueFormatter(p.v):p.v.toLocaleString());
    const tipText=p=>svgEsc(opts.tooltipValueFormatter?opts.tooltipValueFormatter(p.v):(opts.valueFormatter?opts.valueFormatter(p.v):p.v.toLocaleString()));
    const below=si%2===1, tier=Math.floor(si/2);

      pts.map((p)=>{
        return `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${color}" class="wsvg-hover-point" data-tip="${svgEsc(s.name?s.name+" ":"")}${svgEsc(p.cat)}: ${tipText(p)}" data-tip-color="${color}"></circle>${showValues&&p.v?`<text x="${p.x}" y="${labelY(p)}" text-anchor="middle" class="wsvg-point-label">${labelText(p)}</text>`:""}`;
      }).join("");
  }).join("");
  const svg=`<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" class="wsvg-svg" role="img">${axis}${seriesMarkup}${xLabels}</svg>`;
  const title=opts.title?`<div class="wsvg-title">${svgEsc(opts.title)}</div>`:"";
  return `<div class="wsvg-chart-wrap">${title}${svg}${showLegend?svgLegendRow(series):""}</div>`;
}
function svgBarChartMarkup(categories,series,opts={}){
  const width=opts.width||640, height=opts.height||320;
  const padLeft=opts.padLeft||46, padRight=opts.padRight||14, padTop=opts.padTop||24, padBottom=opts.padBottom||(opts.tickAngle?66:34);
  const innerW=width-padLeft-padRight, innerH=height-padTop-padBottom;
  const allValues=series.flatMap(s=>s.values.map(v=>Number(v||0)));
  const {ticks,niceMax}=svgNiceTicks(Math.max(1,...allValues));
  const groupCount=categories.length||1;
  const seriesCount=series.length||1;
  const groupSlot=innerW/groupCount;
  const barGroupWidth=Math.max(4,groupSlot*0.84);
  const barWidth=barGroupWidth/seriesCount;
  const axis=ticks.map(t=>{
    const y=padTop+innerH-(t/niceMax)*innerH;
    return `<line x1="${padLeft}" y1="${y}" x2="${padLeft+innerW}" y2="${y}" class="wsvg-grid"></line><text x="${padLeft-8}" y="${y}" text-anchor="end" dominant-baseline="middle" class="wsvg-axis-label">${svgEsc(opts.axisFormatter?opts.axisFormatter(t):t.toLocaleString())}</text>`;
  }).join("");
  const bars=[];
  const showValues=opts.showValues!==false;
  categories.forEach((cat,ci)=>{
    const groupX=padLeft+ci*groupSlot+(groupSlot-barGroupWidth)/2;
    series.forEach((s,si)=>{
      const value=Number(s.values[ci]||0);
      const barH=niceMax?(value/niceMax)*innerH:0;
      const x=groupX+si*barWidth;
      const y=padTop+innerH-barH;
      const color=(s.barColors&&s.barColors[ci])||s.color||SVG_CHART_COLORS[si%SVG_CHART_COLORS.length];
      const dbl=opts.onBarDblClick?` class="wsvg-bar-group clickable" ondblclick="${opts.onBarDblClick(cat,ci)}"`:' class="wsvg-bar-group"';
      const labelLines=s.labels?(Array.isArray(s.labels[ci])?s.labels[ci]:[s.labels[ci]]):[opts.valueFormatter?opts.valueFormatter(value):value.toLocaleString()];
      const labelMarkup=showValues&&value?labelLines.map((line,li)=>`<text x="${x+barWidth/2}" y="${y-6-(labelLines.length-1-li)*13}" text-anchor="middle" class="wsvg-bar-value">${svgEsc(line)}</text>`).join(""):"";
      const tipText=`${svgEsc(s.name?s.name+" ":"")}${svgEsc(cat)}: ${svgEsc(labelLines.join(" "))}`;
      bars.push(`<g${dbl}><rect x="${x}" y="${y}" width="${Math.max(1,barWidth-2)}" height="${Math.max(1,barH)}" rx="2" fill="${color}" class="wsvg-hover-point" data-tip="${tipText}" data-tip-color="${color}"></rect>${labelMarkup}</g>`);
    });
  });
  const xLabels=categories.map((c,i)=>{
    const x=padLeft+i*groupSlot+groupSlot/2;
    if(opts.tickAngle){
      return `<text x="${x}" y="${height-padBottom+16}" text-anchor="end" class="wsvg-axis-label" transform="rotate(${opts.tickAngle} ${x} ${height-padBottom+16})">${svgEsc(c)}</text>`;

    const parts=String(c).split(" / ");
    if(parts.length>1){
      return `<text x="${x}" y="${yBase}" text-anchor="middle" class="wsvg-axis-label"><tspan x="${x}" dy="0">${svgEsc(parts[0])}</tspan><tspan x="${x}" dy="10">${svgEsc(parts.slice(1).join(" / "))}</tspan></text>`;
    }
    return `<text x="${x}" y="${yBase}" text-anchor="middle" class="wsvg-axis-label">${svgEsc(c)}</text>`;
  }).join("");
  const svg=`<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" class="wsvg-svg" role="img">${axis}${bars.join("")}${xLabels}</svg>`;
  const showLegend=opts.legend!==false && series.length>1 && series.some(s=>s.name);
  const title=opts.title?`<div class="wsvg-title">${svgEsc(opts.title)}</div>`:"";
  return `<div class="wsvg-chart-wrap">${title}${svg}${showLegend?svgLegendRow(series):""}</div>`;
}
function polarToCartesian(cx,cy,r,angleDeg){
  const rad=(angleDeg-90)*Math.PI/180;
  return {x:cx+r*Math.cos(rad), y:cy+r*Math.sin(rad)};
}
function annularSectorPath(cx,cy,rOuter,rInner,startAngle,endAngle){
  const largeArc=(endAngle-startAngle)>180?1:0;
  const p1=polarToCartesian(cx,cy,rOuter,endAngle);
  const p2=polarToCartesian(cx,cy,rOuter,startAngle);
  const p3=polarToCartesian(cx,cy,rInner,startAngle);
  const p4=polarToCartesian(cx,cy,rInner,endAngle);
  return `M ${p1.x} ${p1.y} A ${rOuter} ${rOuter} 0 ${largeArc} 0 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rInner} ${rInner} 0 ${largeArc} 1 ${p4.x} ${p4.y} Z`;
}
function svgPieChartMarkup(items,opts={}){
  const title=opts.title?`<div class="wsvg-title">${svgEsc(opts.title)}</div>`:"";
  if(!items.length) return `<div class="wsvg-chart-wrap">${title}<div class="wsvg-empty">표시할 데이터가 없습니다.</div></div>`;
  const total=items.reduce((s,i)=>s+i.value,0);
  const size=opts.size||230, cx=size/2, cy=size/2, rOuter=size/2, rInner=size/2-size*0.2478;
  const valueFont=Math.round(size*0.13), unitFont=Math.round(size*0.065);
  let angle=0;
  const slices=items.map((item,i)=>{
    const color=item.color||SVG_CHART_COLORS[i%SVG_CHART_COLORS.length];
    const pct=total?(item.value/total)*100:0;
    const startAngle=angle, endAngle=Math.min(angle+pct/100*360,startAngle+359.98);
    angle=endAngle;
    const dbl=opts.onDblClick?` ondblclick="${opts.onDblClick(item)}" class="wsvg-pie-slice clickable"`:' class="wsvg-pie-slice"';
    const extra=opts.extraAttr?opts.extraAttr(item):"";
    const pctLabel=total?Math.round(item.value/total*1000)/10:0;
    return `<path d="${annularSectorPath(cx,cy,rOuter,rInner,startAngle,endAngle)}" fill="${color}"${dbl}${extra} data-tip="${svgEsc(item.label)}: ${item.value.toLocaleString()}건 (${pctLabel}%)" data-tip-color="${color}"></path>`;
  }).join("");
  const donutSvg=`<svg viewBox="0 0 ${size} ${size}" class="wsvg-donut-svg" style="width:${size}px;height:${size}px;flex:0 0 ${size}px" role="img">${slices}<text x="${cx}" y="${cy-4}" text-anchor="middle" dominant-baseline="middle" style="font-size:${valueFont}px;font-weight:900;fill:#111827">${total.toLocaleString()}</text><text x="${cx}" y="${cy+size*0.078}" text-anchor="middle" dominant-baseline="middle" style="font-size:${unitFont}px;font-weight:700;fill:#111827">건</text></svg>`;
  const legend=items.map((item,i)=>{
    const color=item.color||SVG_CHART_COLORS[i%SVG_CHART_COLORS.length];
    const pct=total?Math.round(item.value/total*1000)/10:0;
    const dbl=opts.onDblClick?` class="wsvg-pie-legend-item clickable" ondblclick="${opts.onDblClick(item)}"`:' class="wsvg-pie-legend-item"';
    const extra=opts.extraAttr?opts.extraAttr(item):"";
    return `<div${dbl}${extra}><i style="background:${color}"></i><span>${svgEsc(item.label)}</span><em>${item.value.toLocaleString()}건 (${pct}%)</em></div>`;
  }).join("");
  return `<div class="wsvg-chart-wrap">${title}<div class="wsvg-pie-row">${donutSvg}<div class="wsvg-pie-legend">${legend}</div></div></div>`;
}

function normalizeDashboard(data){

  if(!dashboard.years["2026"]) dashboard.years["2026"]={};
  applyStoredExclusions();
}

function loadFallbackDashboard(){
  try{
    const data=JSON.parse(localStorage.getItem(FALLBACK_STORAGE_KEY)||"null");
    return data&&data.years?data:null;
  }catch{return null}
}

function saveFallbackDashboard(){
  try{
    const trimmed={years:{}};
    Object.keys(dashboard.years||{}).forEach(year=>{
      trimmed.years[year]={};
      Object.keys(dashboard.years[year]||{}).forEach(month=>{
        const d=dashboard.years[year][month]||{};
        trimmed.years[year][month]={count:d.count||0,amount:d.amount||0,excludePenaltyCount:d.excludePenaltyCount||0};
      });
    });
    localStorage.setItem(FALLBACK_STORAGE_KEY,JSON.stringify(trimmed));
  }catch(err){
    console.warn("Defect close dashboard fallback save failed:",err);
  }

function monthNumber(m){if(m==="종합")return -1;const x=String(m).match(/\d+/);return x?parseInt(x[0]):999}
function parseMonthFromText(t){const m=String(t).match(/(\d{1,2})\s*월/);return m?`${parseInt(m[1])}월`:null}
function parseMonth(fileName){const manual=document.getElementById("monthInput").value.trim();return manual || parseMonthFromText(fileName) || fileName.replace(/\.(xls|xlsx)$/i,"")}
function detectYearFromText(text){const s=String(text||""); if(/2025|25년/.test(s))return "2025"; if(/2026|26년/.test(s))return "2026"; return null}
function detectYear(fileName){return detectYearFromText(fileName)||"2026"}
function calcAmount(rows,exclude=0){const apply=Math.max(0,rows.length-Number(exclude||0));return rows.reduce((s,r)=>s+num(r["금액"]),0)+(apply*PENALTY)}

function loadStoredExclusions(){
  try{return JSON.parse(localStorage.getItem(EXCLUDE_STORAGE_KEY)||"{}")||{}}catch{return {}}
}
function saveStoredExclusion(year,month,value){
  const saved=loadStoredExclusions();
  saved[`${year}:${month}`]=Number(value||0);
  localStorage.setItem(EXCLUDE_STORAGE_KEY,JSON.stringify(saved));
}
function storedExclusion(year,month,fallback,count){
  const saved=loadStoredExclusions();
  const raw=saved[`${year}:${month}`];
  const value=raw===undefined?Number(fallback||0):Number(raw||0);
  return Math.min(Math.max(0,value),Number(count||0));
}
function applyStoredExclusions(){
  ["2025","2026"].forEach(year=>{
    Object.keys(dashboard.years[year]||{}).forEach(month=>{
      if(month==="종합"||month==="선택월")return;
      const d=dashboard.years[year][month];
      if(!d)return;
      const excluded=storedExclusion(year,month,d.excludePenaltyCount,d.count);
      d.excludePenaltyCount=excluded;
      d.amount=calcAmount(d.rows||[],excluded);
    });
  });
}

function rebuildTotal(){
  ["2025","2026"].forEach(year=>{
    let all=[], ex=0;
    Object.keys(dashboard.years[year]).forEach(m=>{
      if(m!=="종합" && m!=="선택월"){all=all.concat(dashboard.years[year][m].rows||[]);ex+=Number(dashboard.years[year][m].excludePenaltyCount||0)}
    });
    dashboard.years[year]["종합"]={rows:all,count:all.length,excludePenaltyCount:ex,amount:calcAmount(all,year==="2026"?ex:0)};
  });
}
function currentAccumYear(){return dashboard.years[accumViewYear]?accumViewYear:"2026"}

function toggleSelectMonth(month, checked){
  selectedMonths = selectedMonths.filter(m=>m!==month);

  selectedMonths=[];
  if(dashboard.years[currentAccumYear()]) delete dashboard.years[currentAccumYear()]["선택월"];

function showSelectedMonths(){
  if(!selectedMonths.length){
    alert("합산할 월을 먼저 체크하세요.");
    return;
  }

  const yearObj=dashboard.years[currentAccumYear()];
  let rows=[];
  let exclude=0;

  selectedMonths.forEach(m=>{
    if(yearObj[m]){
      rows = rows.concat(yearObj[m].rows || []);
      exclude += Number(yearObj[m].excludePenaltyCount || 0);
    }
  });

  yearObj["선택월"] = {
    rows: rows,
    count: rows.length,
    excludePenaltyCount: exclude,
    amount: calcAmount(rows, exclude)
  };

  active="선택월";
  render();
}

function setExcludePenalty(month,value){const year=currentAccumYear();const d=dashboard.years[year][month];if(!d)return;let v=Number(value||0);if(v<0)v=0;if(v>d.count)v=d.count;d.excludePenaltyCount=v;d.amount=calcAmount(d.rows||[],v);saveStoredExclusion(year,month,v);active=month;render()}

function countBy(rows,col){const m={};rows.forEach(r=>{const k=r[col]||"미분류";m[k]=(m[k]||0)+1});return Object.entries(m).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count)}

function latestMonthWithData(yearObj,months){let last=0;months.forEach((m,i)=>{if(((yearObj[m]||{count:0}).count||0)>0)last=i+1});return last}
function sumCountThroughMonth(yearObj,months,cutoff){let s=0;months.slice(0,cutoff).forEach(m=>{s+=(yearObj[m]||{count:0}).count||0});return s}

async function fetchWorkbookFromUrl(url){
  const isPublished=/docs\.google\.com\/spreadsheets\/d\/e\//.test(url);
  if(isPublished){
    const res=await fetch(url);
    if(!res.ok){
      const err=await res.json().catch(()=>({error:"스프레드시트를 불러오지 못했습니다."}));
      throw new Error(err.error||"스프레드시트를 불러오지 못했습니다.");
    }
    const text=await res.text();
    return {wb:XLSX.read(text,{type:"string"}), title:""};
  }
  const res=await fetch("/api/google-workbook?url="+encodeURIComponent(url));
  if(!res.ok){
    const err=await res.json().catch(()=>({error:"스프레드시트를 불러오지 못했습니다."}));
    throw new Error(err.error||"스프레드시트를 불러오지 못했습니다.");
  }
  const title=decodeURIComponent(res.headers.get("X-Sheet-Title")||"");
  const data=await res.arrayBuffer();
  return {wb:XLSX.read(new Uint8Array(data),{type:"array"}), title};
}
async function handleSpreadsheetUrlUpload(){

async function importClosingLinkGroup(group){
  const entries=(group.entries&&group.entries.length)?group.entries:[{sourceUrl:group.sourceUrl,label:group.label||""}];
  const results=await Promise.all(entries.map(async(entry)=>{
    const url=entry.sourceUrl||group.sourceUrl;
    if(!url)return 0;
    try{
      const {wb,title}=await fetchWorkbookFromUrl(url);
      const year=detectYearFromText(`${title} ${wb.Props&&wb.Props.Title?wb.Props.Title:""} ${group.groupTitle||""} ${group.label||""} ${url}`)||group.year;
      const monthlySheets=findMonthlySheets(wb);
      let savedHere=0;
      if(monthlySheets.length){
        monthlySheets.forEach(sheetName=>{
          const month=parseMonthFromText(sheetName);
          if(!month)return;
          const rows=rowsFromSheet(wb.Sheets[sheetName]);
          const prevExcluded=Number(dashboard.years[year]?.[month]?.excludePenaltyCount||0);
          const excludePenaltyCount=storedExclusion(year,month,prevExcluded,rows.length);
          dashboard.years[year][month]={rows,count:rows.length,excludePenaltyCount,amount:calcAmount(rows,excludePenaltyCount)};
          savedHere++;
        });
      }else{
        const month=parseMonthFromText(entry.label||"")||parseMonthFromText(entry.sourceSheet||"");
        if(!month)return 0;
        const sheetName=wb.SheetNames[0];
        const rows=rowsFromSheet(wb.Sheets[sheetName]);
        const excludePenaltyCount=Math.min(Math.max(0,Number(entry.excluded||0)),rows.length);
        dashboard.years[year][month]={rows,count:rows.length,excludePenaltyCount,amount:calcAmount(rows,excludePenaltyCount)};
        savedHere++;
      }
      return savedHere;
    }catch(err){
      console.warn("마감자료 항목 가져오기 실패",entry.label||url,err);
      return 0;
    }
  }));
  return results.reduce((sum,n)=>sum+n,0);
}

  const groupResults=await Promise.all(groups.map(async(group)=>{

      console.warn("마감자료 링크 자동 반영 실패", group.groupTitle||group.label||group.sourceUrl, err);

}

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"이력");

}

async function initDashboard(){await loadConfig();await loadData();await syncClosingLinksFromMainDashboard();applyEditMode();render(false)}
window.addEventListener("storage",async e=>{
  if(e.key!==LINK_STORAGE_KEY)return;
  await loadData();
  await syncClosingLinksFromMainDashboard();
  render(false);
});
let accumDataCollapsed=true;
let accumViewYear="2026";
function ensureAccumDataControls(){
  const months=document.getElementById("months");
  if(!months)return;
  const panel=months.closest(".panel");
  const mount=document.getElementById("accumDataMount");
  if(!panel||!mount)return;
  document.querySelector("body>h1")?.style.setProperty("display","none");
  if(panel.parentNode!==mount)mount.appendChild(panel);
  const toggle=document.getElementById("accumDataToggleBtn");
  if(toggle && toggle.dataset.bound!=="1"){
    toggle.dataset.bound="1";
    toggle.addEventListener("click",()=>{
      accumDataCollapsed=!accumDataCollapsed;
      applyAccumDataCollapse();
    });
  }
  const toolbar=months.querySelector("div");
  if(toolbar && !document.getElementById("accumYearSelect")){
    const select=document.createElement("select");
    select.id="accumYearSelect";
    select.className="accum-year-select";
    ["2025","2026","2027"].forEach(year=>{
      const option=document.createElement("option");
      option.value=year;
      option.textContent=year+"년";
      select.appendChild(option);
    });
    select.value=accumViewYear;
    select.addEventListener("change",()=>{
      accumViewYear=select.value;
      render();
    });
    toolbar.insertBefore(select,toolbar.firstChild);
  }
  applyAccumDataCollapse();
}
function applyAccumDataCollapse(){
  const panel=document.getElementById("months")?.closest(".panel");
  const toggle=document.getElementById("accumDataToggleBtn");
  if(panel)panel.style.display=accumDataCollapsed?"none":"block";
  if(toggle)toggle.classList.toggle("active",!accumDataCollapsed);
}
const originalRenderMonthsForAccumControls=renderMonths;
renderMonths=function(){
  originalRenderMonthsForAccumControls();
  ensureAccumDataControls();
};
const originalRenderForAccumControls=render;
render=function(shouldSave=true){
  originalRenderForAccumControls(shouldSave);
  ensureAccumDataControls();
};
initDashboard();
